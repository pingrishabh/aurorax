# nginx = the load balancer + static host + single entry point.
#
# It serves the built SPA and reverse-proxies /api to the `api` service. The
# api runs as N replicas; using a *variable* upstream forces nginx to resolve
# `api` via Docker's embedded DNS (127.0.0.11) on each request, so traffic
# round-robins across replica IPs. Because the api tier is stateless (all live
# state is in Redis), no sticky sessions are needed — this is the crux of the
# horizontal-scaling design.

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    root /usr/share/nginx/html;
    index index.html;

    # API + SSE -> api replicas
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # Required for Server-Sent Events: don't buffer, don't time out the
        # long-lived stream, flush chunks straight through.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
